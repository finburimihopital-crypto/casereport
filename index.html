:root {
  --primary: #1a3a5c;

}
#root { min-height: 100vh; display: flex; flex-direction: column; }

/* TOP NAV */
.topnav {

.report-card {

}

}

.empty-state {

/* TOAST */
.toast-container { position: fixed; top: 70px; right: 50%; transform: translateX(50%); z-index: 9999; min-width: 280px; text-align: center; }
.toast {

}
.toast.success { background: var(--success); }

/* MODAL */
.modal-overlay {

.report-viewer {

}
.report-viewer-header {

/* PRINT STYLES - A4 single page auto-scale */
@media print {
  @page {
    size: A4 portrait;
    margin: 6mm 8mm;
  }

  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  body, html { margin: 0; padding: 0; background: white !important; }

  .topnav, .bottomnav, .no-print,
  .btn, .btn-group, .filter-row,
  .search-wrap, .summary-bar,
  .toast-container, .modal-overlay,
  .confirm-overlay, .img-modal-overlay { display: none !important; }

  .main-content { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }

  /* ═══ SHOW ONLY PRINTABLE CONTENT ═══ */
  /* Hide all UI */
  body > #root > * { display: none !important; }

  /* Show .report-viewer (Summary) and .rpt-viewer (Individual) */
  .report-viewer { display: block !important; }
  .rpt-viewer    { display: block !important; }

  /* Make the individual report fill the A4 page */
  .rpt-viewer {
    position: fixed !important;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw !important;
    height: 100vh !important;
    padding: 4mm !important;
    margin: 0 !important;
    background: white !important;
    box-sizing: border-box !important;
    overflow: visible !important;
    font-size: clamp(6px, 1.1vw, 11px) !important;
    font-family: 'Cairo', 'Amiri', sans-serif !important;
    direction: rtl !important;
  }

  /* Inner border div fills full height */
  .rpt-viewer > div:first-child {
    height: calc(100vh - 8mm) !important;
    display: flex !important;
    flex-direction: column !important;
    box-sizing: border-box !important;
    padding: 6px !important;
    overflow: visible !important;
  }

  /* Ensure violation photos show in print */
  .rpt-viewer img, .report-viewer img {
    display: inline-block !important;
    visibility: visible !important;
    opacity: 1 !important;
  }
  /* Violation photo — 5cm wide x 4cm tall on A4 */
  .rpt-viewer td img {
    width: 100% !important;
    height: 151px !important;
    object-fit: cover !important;
    border-radius: 3px !important;
    display: block !important;
  }

  /* Summary report — normal flow (may be multiple pages) */
  .report-viewer {
    position: static !important;
    width: 100% !important;
    height: auto !important;
    padding: 4mm !important;
    margin: 0 !important;
    background: white !important;
    box-sizing: border-box !important;
    overflow: visible !important;
    font-size: clamp(6px, 1.1vw, 11px) !important;
    font-family: 'Cairo', 'Amiri', sans-serif !important;
  }

  /* Tables */
  .rpt-viewer table, .report-viewer table { page-break-inside: avoid; }
  .rpt-viewer th, .rpt-viewer td,
  .report-viewer th, .report-viewer td {
    padding: 3px 5px !important;
    font-size: inherit !important;
    line-height: 1.3 !important;
  }

  /* Logos */
  .rpt-viewer img[alt="شعار وزارة الصحة"],
  .report-viewer img[alt="شعار وزارة الصحة الإجمالي"] {
    height: 48px !important;
  }

  /* Compact margins */
  .rpt-viewer > div > *, .report-viewer > div > * { margin-bottom: 4px !important; }
  .rpt-viewer td > div, .report-viewer td > div { margin-bottom: 8px !important; }

  /* ===== BLACK & WHITE MODE ===== */
  body.bw-print * {
    color: #000 !important;
    background: #fff !important;
    border-color: #000 !important;
    -webkit-filter: grayscale(100%) !important;
    filter: grayscale(100%) !important;
    text-shadow: none !important;
    box-shadow: none !important;
  }
  body.bw-print img {
    -webkit-filter: grayscale(100%) contrast(1.2) !important;
    filter: grayscale(100%) contrast(1.2) !important;
  }
  body.bw-print table, body.bw-print td, body.bw-print th {
    border: 1px solid #000 !important;
  }
  body.bw-print .report-viewer {
    border: 2px solid #000 !important;
  }
}

function getDB() {
  try {
    if (typeof firebase !== 'undefined' && typeof db !== 'undefined') return db;
  } catch(e) {}
  return null;
}

// Firebase read/write helpers
function loadData(key, def) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; }
  catch { return def; }
}
function saveData(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  // Sync to Firebase — للصور نحفظ الـ URL فقط (مش base64)
  try {
    const d = getDB();
    if (!d) return;
    if (key === KEYS.violations && Array.isArray(val)) {
      const stripped = val.map(v => {
        if (!v.photo) return v;
        // إذا URL (Firebase Storage) نحفظه — إذا base64 نحذفه ونحتفظ بـ hasPhoto
        if (v.photo.startsWith('http')) return v; // Firebase URL ✅
        const {photo, ...rest} = v;
        return {...rest, hasPhoto: true}; // base64 محلي فقط
      });
      d.ref(key).set(stripped);
    } else if (key === KEYS.genReports && Array.isArray(val)) {
      // Strip photos from genReports violations for Firebase (too large)
      // Photos are preserved in violations key and localStorage
      const strippedGR = val.map(gr => ({
        ...gr,
        violations: Array.isArray(gr.violations)
          ? gr.violations.map(v => {
              if (!v.photo) return v;
              if (v.photo.startsWith('http')) return v;
              const {photo, ...rest} = v;
              return {...rest, hasPhoto: true};
            })
          : gr.violations
      }));
      d.ref(key).set(strippedGR);
    } else {
      d.ref(key).set(val);
    }
  } catch(e) {}
}

// Subscribe to Firebase changes and sync to localStorage
function subscribeFirebase(key, callback) {
  try {
    const d = getDB();
    if (!d) { console.log('Firebase not available, using localStorage only'); return; }
    d.ref(key).on('value', (snap) => {
      const val = snap.val();
      if (val !== null && val !== undefined) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
        callback(val);
      }
    });
  } catch(e) { console.log('Firebase subscribe error:', e); }
}

// ضغط الصورة لأقصى حجم محدد
function compressImage(src, maxW=400, quality=0.5) {
  return new Promise(resolve => {
    if (!src) { resolve(src); return; }
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}


function fmtDate(d) {
  if (!d) return '';
  const dd = new Date(d);
  return dd.toLocaleDateString('ar-OM', { year: 'numeric', month: '2-digit', day: '2-digit' });
}
function fmtDateTime(d) {
  if (!d) return '';
  const dd = new Date(d);
  const date = dd.toLocaleDateString('ar-OM', { year:'numeric', month:'2-digit', day:'2-digit' });
  const time = dd.toLocaleTimeString('ar-OM', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
  return date + '  ' + time;
}
function fmtAmt(n) { return (parseFloat(n)||0).toFixed(3) + ' OMR'; }
function fmtMonth(d) {
  if (!d) return '..........';
  try {
    return new Date(d).toLocaleDateString('ar-OM', { month: 'long', year: 'numeric' });
  } catch(e) { return '..........'; }
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  }, []);
  const el = toast ? React.createElement('div', {className:'toast-container'},
    React.createElement('div', {className:`toast ${toast.type}`}, toast.msg)
  ) : null;
  return [el, show];
}

// ===================== SEARCHABLE DROPDOWN =====================
function SearchableDropdown({ items, value, onChange, placeholder, renderItem, renderSelected, filterItem, disabled }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState('');
  const ref = useRef();
  const selected = items.find(i => i.id === value);
  const filtered = q ? items.filter(i => filterItem(i, q)) : items;
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  return React.createElement('div', {className:'dropdown-wrap', ref},
    React.createElement('div', {
      className:'form-control select-styled',
      onClick: () => !disabled && setOpen(o => !o),
      style: { cursor: disabled ? 'default' : 'pointer', display:'flex', justifyContent:'space-between', alignItems:'center', gap:'6px' }
    },
      React.createElement('span', {className:'dropdown-selected-text'}, selected ? renderSelected(selected) : React.createElement('span', {style:{color:'var(--text3)', fontWeight:400}}, placeholder || 'اختر...')),
      React.createElement('span', {className:'dropdown-arrow'}, open ? '▲' : '▼')
    ),
    open && React.createElement('div', {className:'dropdown-list'},
      React.createElement('div', {style:{padding:'6px 8px', borderBottom:'1px solid var(--bg2)'}},
        React.createElement('input', {
          className:'form-control',
          placeholder:'بحث...',
          value:q,
          onChange:e=>{setQ(e.target.value)},
          autoFocus:true,
          style:{padding:'7px 10px', fontSize:'13px'}
        })
      ),
      filtered.length === 0
        ? React.createElement('div', {className:'dropdown-empty'}, 'لا توجد نتائج')
        : filtered.map(item => React.createElement('div', {
            key:item.id,
            className:`dropdown-item ${value===item.id?'active':''}`,
            onClick: () => { onChange(item.id); setOpen(false); setQ(''); }
          }, renderItem(item)))
    )
  );
}

      a.href = src;
      // If it's a Firebase URL, open in new tab (can't force download cross-origin)
      if (src.startsWith('http')) {
        window.open(src, '_blank');
        return;
      }
      // For base64 local images, download directly
      a.download = 'صورة_مخالفة_' + Date.now() + '.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch(e) {
      window.open(src, '_blank');
    }
  };

  return React.createElement('div', {className:'img-modal-overlay', onClick:onClose},
    React.createElement('div', {className:'img-modal-box', onClick:e=>e.stopPropagation()},
      React.createElement('button', {className:'img-modal-close', onClick:onClose}, '✕'),
      React.createElement('img', {src, alt:'صورة المخالفة'}),
      React.createElement('button', {
        onClick: downloadImg,
        style:{
          display:'block', width:'100%', marginTop:'10px',
          background:'#1a3a5c', color:'white', border:'none',
          borderRadius:'8px', padding:'10px', fontSize:'14px',
          fontWeight:700, cursor:'pointer', fontFamily:"'Cairo',sans-serif"
        }
      }, '📥 تنزيل الصورة')
    )
  );
}

function App({ currentUser, userInfo, onLogout }) {
  const [page, setPage] = useState('home');
  const [pageParam, setPageParam] = useState(null);
  const [reports, setReports] = useState(() => loadData(KEYS.reports, []));
  const [violations, setViolations] = useState(() => loadData(KEYS.violations, []));
  const [vioMaster, setVioMaster] = useState(() => loadData(KEYS.vioMaster, INIT_VIOLATIONS_MASTER));
  const [clinics, setClinics] = useState(() => loadData(KEYS.clinics, INIT_CLINICS));
  const [genReports, setGenReports] = useState(() => loadData(KEYS.genReports, []));
  const [inspectors, setInspectors] = useState(() => loadData('insp_inspectors', INSPECTORS_DEFAULT));
  const [company, setCompany] = useState(() => loadData('insp_company', COMPANY_DEFAULT));
  const [imgPreview, setImgPreview] = useState(null);
  const [toastEl, showToast] = useToast();
  const [fbConnected, setFbConnected] = useState(false);
  const currentReportRef = React.useRef(null); // stores the latest generated report

  // Firebase real-time sync - subscribe on mount
  useEffect(() => {
    subscribeFirebase(KEYS.reports, (val) => { if(Array.isArray(val)) setReports(val); });
    subscribeFirebase(KEYS.violations, (val) => {
      if(!Array.isArray(val)) return;
      try {
        // Use photo_store as PRIMARY (never stripped by Firebase)
        const photoStore = JSON.parse(localStorage.getItem('insp_photo_store') || '{}');
        const localVios = JSON.parse(localStorage.getItem(KEYS.violations) || '[]');
        const photoMap = {...photoStore};
        localVios.forEach(v => { if(v.photo) photoMap[v.id] = v.photo; });
        const merged = val.map(v => photoMap[v.id] ? {...v, photo: photoMap[v.id]} : v);
        setViolations(merged);
      } catch(e) { setViolations(val); }
    });
    subscribeFirebase(KEYS.vioMaster, (val) => { if(Array.isArray(val)) setVioMaster(val); });
    subscribeFirebase(KEYS.clinics, (val) => { if(Array.isArray(val)) setClinics(val); });
    subscribeFirebase(KEYS.genReports, (val) => {
      if(!Array.isArray(val)) return;
      try {
        // photo_store = PRIMARY source (never stripped)
        const photoStore = JSON.parse(localStorage.getItem('insp_photo_store') || '{}');
        const localVios = JSON.parse(localStorage.getItem(KEYS.violations) || '[]');
        const photoMap = {...photoStore};
        localVios.forEach(v => { if(v.photo) photoMap[v.id] = v.photo; });
        const restored = val.map(gr => ({
          ...gr,
          violations: Array.isArray(gr.violations)
            ? gr.violations.map(v => photoMap[v.id] ? {...v, photo: photoMap[v.id]} : v)
            : gr.violations
        }));
        setGenReports(restored);
      } catch(e) { setGenReports(val); }
    });
    // Monitor connection safely
    try {
      const d = getDB();
      if (d) d.ref('.info/connected').on('value', (snap) => { setFbConnected(snap.val() === true); });
    } catch(e) {}
  }, []);

  // Save to Firebase + localStorage on every change
  useEffect(() => { saveData(KEYS.reports, reports); }, [reports]);
  useEffect(() => { saveData(KEYS.violations, violations); }, [violations]);
  useEffect(() => { saveData(KEYS.vioMaster, vioMaster); }, [vioMaster]);
  useEffect(() => { saveData(KEYS.clinics, clinics); }, [clinics]);
  useEffect(() => { saveData(KEYS.genReports, genReports); }, [genReports]);
  useEffect(() => { saveData('insp_inspectors', inspectors); }, [inspectors]);
  useEffect(() => { saveData('insp_company', company); }, [company]);

  const nav = (p, param=null) => { setPage(p); setPageParam(param); window.scrollTo(0,0); };

  // Derived
  const reportViolations = (reportId) => violations.filter(v => v.reportId === reportId);
  const reportTotal = (reportId) => reportViolations(reportId).reduce((s,v)=>s+(parseFloat(v.amount)||0),0);

  const totalFines = violations.reduce((s,v)=>s+(parseFloat(v.amount)||0),0);

  const mostFreqClinic = useMemo(() => {
    if (!violations.length) return null;
    const count = {};
    violations.forEach(v => { if(v.clinicName) count[v.clinicName]=(count[v.clinicName]||0)+1; });
    const sorted = Object.entries(count).sort((a,b)=>b[1]-a[1]);
    return sorted[0]?.[0] || null;
  }, [violations]);

  const highestFinesClinic = useMemo(() => {
    if (!violations.length) return null;
    const sums = {};
    violations.forEach(v => { if(v.clinicName) sums[v.clinicName]=(sums[v.clinicName]||0)+(parseFloat(v.amount)||0); });

function NewReportPage({ reports, setReports, violations, clinics, nav, pageParam, showToast, reportViolations, reportTotal, editMode, inspectors, company }) {
  const existing = editMode ? reports.find(r=>r.id===pageParam) : null;

  // Auto-generate report number: RPT-YYYY-XXX
  const autoReportNumber = React.useMemo(() => {
    if (editMode && existing) return existing.reportNumber;
    const year = new Date().getFullYear();
    const count = reports.filter(r => r.reportNumber && r.reportNumber.startsWith('RPT-'+year)).length + 1;
    return 'RPT-' + year + '-' + String(count).padStart(3,'0');
  }, [reports, editMode, existing]);

  const [form, setForm] = useState(existing ? {...existing} : {
    reportNumber: autoReportNumber,
    inspectorName: '',
    inspectionDate: new Date().toISOString().split('T')[0],
    notes: '',
    status: 'Draft',
    clinicId: '', clinicName: '', reportPhoto: ''
  });
  const [errors, setErrors] = useState({});

  useEffect(() => {
    if (!editMode) setForm(p=>({...p, reportNumber: autoReportNumber}));
  }, [autoReportNumber, editMode]);

  const validate = () => {
    const e = {};
    if (!form.inspectorName.trim()) e.inspectorName = 'اسم مراقب النظافة مطلوب';
    if (!form.inspectionDate) e.inspectionDate = 'تاريخ الزيارة مطلوب';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const save = (redirect) => {
    if (!validate()) return;
    if (editMode) {
      setReports(prev => prev.map(r => r.id===existing.id ? {...form, updatedAt: new Date().toISOString()} : r));
      showToast('تم تحديث المحضر بنجاح ✓');
      nav('reportDetails', existing.id);

      const newR = { ...form, id: uid(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
      setReports(prev => [...prev, newR]);
      showToast('تم حفظ المحضر بنجاح ✓');
      if (redirect) nav('addViolations', newR.id);
      else nav('reportDetails', newR.id);

  return React.createElement('div', null,

        React.createElement('input', {type:'date', className:'form-control', value:form.inspectionDate, onChange:e=>setForm(p=>({...p,inspectionDate:e.target.value}))}),

    return matchQ && matchS;

function ViolationFormPage({ violations, setViolations, vioMaster, clinics, setClinics, nav, pageParam, showToast, editMode, reports, genReports, setGenReports, currentReportRef }) {
  const reportId = editMode ? pageParam.reportId : pageParam;
  const vioId = editMode ? pageParam.vioId : null;
  const existing = editMode ? violations.find(v=>v.id===vioId) : null;
  const reportVios = violations.filter(v=>v.reportId===reportId);
  const nextSerial = editMode ? existing?.serialNo : reportVios.length + 1;

  const [form, setForm] = useState(existing ? {...existing} : {
    violationId:'', violationCode:'', violationName:'', amount:0,
    violationDate: new Date().toISOString().split('T')[0],
    clinicId:'', clinicName:'', notes:'', photo:''
  });
  const [errors, setErrors] = useState({});
  const photoRef = useRef();
  const [showAddClinic, setShowAddClinic] = useState(false);
  const [newClinicName, setNewClinicName] = useState('');
  const [newClinicErr, setNewClinicErr] = useState('');

  const saveNewClinic = () => {
    const trimmed = newClinicName.trim();
    if (!trimmed) { setNewClinicErr('اسم الموقع مطلوب'); return; }
    if (clinics.find(c => c.name === trimmed)) { setNewClinicErr('هذا الموقع موجود مسبقاً'); return; }
    const newC = { id: uid(), name: trimmed, active: true };
    setClinics(prev => [...prev, newC]);
    setForm(p => ({...p, clinicId: newC.id, clinicName: newC.name}));
    setShowAddClinic(false);
    setNewClinicName('');
    setNewClinicErr('');
    showToast('تم إضافة الموقع وتحديده ✓');
  };

  const validate = () => {
    const e = {};
    if (!form.violationId) e.violationId = 'يجب اختيار بند المخالفة';
    if (!form.violationDate) e.violationDate = 'تاريخ المخالفة مطلوب';
    if (!form.clinicId) e.clinicId = 'يجب اختيار الموقع';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const save = (another) => {
    if (!validate()) return;

    if (editMode) {
      setViolations(prev => prev.map(v=>v.id===vioId ? {...form, id:vioId, reportId, updatedAt:new Date().toISOString()} : v));
      showToast('تم تحديث المخالفة ✓');
      nav('addViolations', reportId);
    } else {
      const now = new Date();
      const newVId = uid();
      // Save photo separately by ID for reliable recovery
      if (form.photo) {
        try {
          const photoStore = JSON.parse(localStorage.getItem('insp_photo_store') || '{}');
          photoStore[newVId] = form.photo;
          localStorage.setItem('insp_photo_store', JSON.stringify(photoStore));
        } catch(e) {}
      }
      const newV = {...form, id:newVId, reportId, serialNo:nextSerial, createdAt:now.toISOString(), savedAt:now.toISOString()};
      // Restore photos from localStorage (Firebase sync may have stripped them)
      let baseVios = violations.filter(v=>v.reportId===reportId);
      try {
        const localVios = JSON.parse(localStorage.getItem('insp_violations') || '[]');
        const photoStore = JSON.parse(localStorage.getItem('insp_photo_store') || '{}');
        const localPhotoMap = {...photoStore};
        localVios.forEach(v => { if(v.photo) localPhotoMap[v.id] = v.photo; });
        baseVios = baseVios.map(v => localPhotoMap[v.id] ? {...v, photo: localPhotoMap[v.id]} : v);
      } catch(e) {}
      const updatedVios = [...baseVios, newV];
      setViolations(prev=>[...prev, newV]);

      if (another) {
        setForm({violationId:'',violationCode:'',violationName:'',amount:0,violationDate:form.violationDate,clinicId:form.clinicId,clinicName:form.clinicName,notes:'',photo:''});
        setErrors({});
        showToast('تم حفظ المخالفة ✓');
      } else {
        const report = reports.find(r=>r.id===reportId);
        const totalAmt = updatedVios.reduce((s,v)=>s+(parseFloat(v.amount)||0),0);
        const gr = {
          id: uid(),
          reportId,
          reportNumber: report?.reportNumber || '',
          reportTitle: report?.reportTitle || '',
          generatedAt: now.toISOString(),
          totalViolations: updatedVios.length,
          totalAmount: totalAmt,
          violations: updatedVios
        };
        if (currentReportRef) currentReportRef.current = gr;
        setGenReports(prev => {
          const filtered = prev.filter(r => r.reportId !== reportId);
          return [...filtered, gr];
        });
        showToast('تم حفظ المخالفة وتوليد التقرير ✓');
        nav('reportViewer', 'current');
      }
    }
  };

  const handlePhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // ضغط الصورة قبل الحفظ
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800; // أقصى عرض أو ارتفاع
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
        else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.6); // جودة 60%
        setForm(p=>({...p, photo: compressed}));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const activeVios = vioMaster.filter(v=>v.active);

  return React.createElement('div', null,
    // === مودال إضافة موقع جديد ===
    showAddClinic && React.createElement('div', {className:'modal-overlay', onClick:()=>setShowAddClinic(false)},
      React.createElement('div', {className:'modal-box', onClick:e=>e.stopPropagation(), style:{maxWidth:'400px'}},
        React.createElement('div', {className:'modal-title'}, '🏥 إضافة موقع / عيادة جديدة'),
        React.createElement('div', {className:'form-group'},
          React.createElement('label', {className:'form-label'}, 'اسم الموقع أو العيادة ', React.createElement('span',{className:'req'},'*')),
          React.createElement('input', {
            className:'form-control',
            placeholder:'مثال: عيادة الجلدية الجديدة',
            value: newClinicName,
            onChange: e => { setNewClinicName(e.target.value); setNewClinicErr(''); },
            autoFocus: true,
            onKeyDown: e => { if (e.key === 'Enter') saveNewClinic(); },
            style:{fontSize:'15px', padding:'12px'}
          }),
          newClinicErr && React.createElement('div',{className:'form-error', style:{marginTop:'6px'}}, newClinicErr)
        ),
        React.createElement('div', {style:{background:'var(--warning-bg)', border:'1px solid #fbbf24', borderRadius:'6px', padding:'10px 12px', fontSize:'12px', color:'var(--warning)', marginBottom:'14px'}},
          '💡 بعد الحفظ سيتم تحديد هذا الموقع تلقائياً في نموذج المخالفة'
        ),
        React.createElement('div', {className:'btn-group'},
          React.createElement('button', {className:'btn btn-success', onClick:saveNewClinic, style:{flex:2}}, '✅ حفظ وتحديد'),
          React.createElement('button', {className:'btn btn-outline', onClick:()=>{setShowAddClinic(false);setNewClinicName('');setNewClinicErr('');}}, 'إلغاء'),
        )
      )
    ),
    React.createElement('div', {className:'card'},
      React.createElement('div', {className:'card-header'}, editMode ? '✏️ تعديل المخالفة' : '📝 بيانات المخالفة الجديدة'),
      React.createElement('div', {className:'form-group'},
        React.createElement('label', {className:'form-label'}, 'رقم التسلسل'),
        React.createElement('input', {className:'form-control', value:nextSerial, readOnly:true})
      ),
      React.createElement('div', {className:'form-group'},
        React.createElement('label', {className:'form-label'}, 'البند ', React.createElement('span',{className:'req'},'*')),
        React.createElement(SearchableDropdown, {
          items: activeVios,
          value: form.violationId,
          onChange: (id) => {
            const v = activeVios.find(x=>x.id===id);
            if(v) setForm(p=>({...p, violationId:id, violationCode:v.code, violationName:v.name, amount:v.amount}));

                React.createElement('div', {style:{fontSize:'12px', fontWeight:800, color:'var(--accent)', marginTop:'2px'}}, '= ' + item.amount + ' OMR')
              )

// ===================== REPORT VIEWER PAGE =====================
function ReportViewerPage({ genReports, reports, nav, pageParam, showToast, setImgPreview, company, currentReportRef }) {
  const reportRef = React.useRef();

  // SIMPLE: get report data - works in all cases
  let gr = null;
  try {
    if (pageParam === 'current') {
      gr = currentReportRef && currentReportRef.current ? currentReportRef.current : null;
    } else if (pageParam && typeof pageParam === 'object') {
      gr = pageParam;
    } else if (pageParam) {
      gr = genReports.find(r => r.id === pageParam) || null;
    }
  } catch(e) { gr = null; }

  if (!gr) {
    return React.createElement('div', {style:{textAlign:'center',padding:'60px 20px',color:'#8aa0b8'}},
      React.createElement('div', {style:{fontSize:'40px',marginBottom:'12px'}}, '📋'),
      React.createElement('div', {style:{fontSize:'16px',fontWeight:700}}, 'التقرير غير موجود'),
      React.createElement('div', {style:{fontSize:'12px',marginTop:'8px'}}, 'pageParam: ' + String(pageParam)),
      React.createElement('button', {
        className:'btn btn-outline',
        style:{marginTop:'16px'},
        onClick:()=>nav('savedReports')
      }, '← رجوع للمحفوظات')
    );
  }

  const report = reports.find(r => r.id === gr.reportId) || {};

  // Always restore photos from localStorage before rendering
  const vios = React.useMemo(() => {
    const rawVios = Array.isArray(gr.violations) ? gr.violations : [];
    try {
      // PRIMARY: photo_store (dedicated store, never stripped by Firebase)
      const photoStore = JSON.parse(localStorage.getItem('insp_photo_store') || '{}');
      // SECONDARY: violations localStorage (fallback)
      const localVios = JSON.parse(localStorage.getItem('insp_violations') || '[]');
      const photoMap = {...photoStore};
      localVios.forEach(v => { if(v.photo) photoMap[v.id] = v.photo; });
      return rawVios.map(v => photoMap[v.id] ? {...v, photo: photoMap[v.id]} : v);
    } catch(e) { return rawVios; }
  }, [gr.violations]);
  const totalAmt = vios.reduce((s,v) => s+(parseFloat(v.amount)||0), 0);
  const reportMonth = fmtMonth(report.inspectionDate);
  const companyName = (company && company.name) ? company.name : 'الطاووس للخدمات الصناعية';
  const contractType = (company && company.contract) ? company.contract : 'خدمة النظافة';

  const downloadExcel = () => {
    try {
      const wb = XLSX.utils.book_new();
      const rows = [
        ['محضر إثبات حالة وغرامة'],[''],
        ['رقم المحضر', gr.reportNumber||'', '', 'مراقب النظافة', report.inspectorName||''],
        ['تاريخ الزيارة', fmtDate(report.inspectionDate)||''],[''],
        ['م','رمز المخالفة','البند','مبلغ المخالفة','المكان','ملاحظات'],
        ...vios.map((v,i)=>[v.serialNo||i+1, v.violationCode||'', v.violationName||'', v.amount||0, v.clinicName||'', v.notes||'']),
        [''],['','','إجمالي المخالفات',vios.length,'',''],
        ['','','إجمالي الغرامات','','',totalAmt.toFixed(3)+' OMR'],
      ];
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols']=[{wch:5},{wch:12},{wch:55},{wch:16},{wch:22},{wch:25}];
      XLSX.utils.book_append_sheet(wb, ws, 'التقرير');
      XLSX.writeFile(wb, 'محضر_'+(gr.reportNumber||'')+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
      showToast('تم تنزيل Excel ✓');
    } catch(e) { showToast('خطأ: '+e.message,'error'); }
  };

  // دالة مشتركة لتوليد PDF بجودة عالية
  const _buildPDF = async (bw) => {
    const el = reportRef.current;
    if(!el) { showToast('خطأ: العنصر غير موجود','error'); return; }
    showToast(bw ? 'جاري تحضير PDF أبيض وأسود...' : 'جاري تحضير PDF ملون...');

    // إنشاء نافذة مخفية بالمحتوى + CSS مخصص
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:794px;height:1123px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    await new Promise(resolve => {
      iframe.onload = resolve;
      iframe.srcdoc = `<!DOCTYPE html><html dir="rtl" lang="ar"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Cairo',sans-serif; direction:rtl; }
body { background:white; width:794px; }
${bw ? `
* { color:#000 !important; background:#fff !important; border-color:#333 !important; }
img { filter:grayscale(100%) contrast(1.3) !important; -webkit-filter:grayscale(100%) contrast(1.3) !important; }
` : ''}
</style></head><body>${el.outerHTML}</body></html>`;
    });

    // انتظر تحميل الصور والخطوط
    await new Promise(r => setTimeout(r, 1500));

    const iDoc = iframe.contentDocument || iframe.contentWindow.document;
    const target = iDoc.querySelector('.rpt-viewer') || iDoc.body.firstElementChild || iDoc.body;

    const canvas = await html2canvas(target, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      imageTimeout: 0,
      logging: false,
      windowWidth: 794,
    });

    document.body.removeChild(iframe);

    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const W = pdf.internal.pageSize.getWidth();
    const H = pdf.internal.pageSize.getHeight();
    const imgW = W - 10;
    const imgH = (canvas.height * imgW) / canvas.width;
    const quality = bw ? 0.95 : 0.92;
    const fmt = bw ? 'JPEG' : 'JPEG';

    if (imgH <= H - 10) {
      pdf.addImage(canvas.toDataURL('image/jpeg', quality), fmt, 5, 5, imgW, imgH);
    } else {
      let rem = imgH, sy = 0, pageH = H - 10;
      while (rem > 0) {
        const sh = Math.min(rem, pageH);
        const sc = document.createElement('canvas');
        const ratio = canvas.height / imgH;
        sc.width = canvas.width;
        sc.height = Math.round(sh * ratio);
        sc.getContext('2d').drawImage(
          canvas, 0, Math.round(sy * ratio),
          canvas.width, sc.height, 0, 0, canvas.width, sc.height
        );
        pdf.addImage(sc.toDataURL('image/jpeg', quality), fmt, 5, 5, imgW, sh);
        rem -= sh; sy += sh;
        if (rem > 0) pdf.addPage();
      }
    }

    const suffix = bw ? '_أبيض_أسود' : '_ملون';
    pdf.save('محضر_' + (gr.reportNumber||'') + suffix + '_' + new Date().toISOString().split('T')[0] + '.pdf');
    showToast('✅ تم تنزيل PDF بجودة عالية');
  };

  const downloadPDF    = () => _buildPDF(false);
  const downloadPDFbw  = () => _buildPDF(true);

  const fontSize = Math.max(7, Math.min(11, Math.round(11-(vios.length-5)*0.22)));

// ===================== SUMMARY REPORT PAGE =====================
function SummaryReportPage({ reports, violations, nav, showToast, reportViolations, reportTotal, company }) {
  const [selected, setSelected] = useState({});
  const [showReport, setShowReport] = useState(false);
  const [q, setQ] = useState('');
  const reportRef = useRef();

  const sorted = [...reports].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const filtered = sorted.filter(r => !q || r.reportNumber.includes(q) || r.inspectorName?.includes(q));

  const toggleSelect = (id) => setSelected(p => ({...p, [id]: !p[id]}));
  const toggleAll = () => {
    const allSelected = filtered.every(r => selected[r.id]);
    const next = {};
    filtered.forEach(r => { next[r.id] = !allSelected; });
    setSelected(p => ({...p, ...next}));
  };

  const selectedReports = reports.filter(r => selected[r.id]);
  const grandTotal = selectedReports.reduce((s,r) => s + reportTotal(r.id), 0);
  const grandVioCount = selectedReports.reduce((s,r) => s + reportViolations(r.id).length, 0);

  // استخراج الشهر تلقائياً من تواريخ المحاضر المختارة
  const getAutoMonth = () => {
    if (!selectedReports.length) return '..........';
    const dates = selectedReports
      .map(r => r.inspectionDate)
      .filter(Boolean)
      .map(d => new Date(d))
      .filter(d => !isNaN(d));
    if (!dates.length) return '..........';
    // أكثر شهر تكراراً
    const monthCount = {};
    dates.forEach(d => {
      const key = d.getFullYear() + '-' + d.getMonth();
      monthCount[key] = (monthCount[key] || 0) + 1;
    });
    const topKey = Object.entries(monthCount).sort((a,b)=>b[1]-a[1])[0][0];
    const [year, month] = topKey.split('-').map(Number);
    const date = new Date(year, month, 1);
    return date.toLocaleDateString('ar-OM', { month: 'long', year: 'numeric' });
  };
  const autoMonth = getAutoMonth();
  const logoSrc = typeof LOGO_SRC !== 'undefined' ? LOGO_SRC : '';

  // دالة مشتركة PDF إجمالي بجودة عالية
  const _buildSummaryPDF = async (bw) => {
    if (!selectedReports.length) { showToast('اختر محضراً واحداً على الأقل', 'error'); return; }
    showToast(bw ? 'جاري تحضير PDF أبيض وأسود...' : 'جاري تحضير PDF ملون...');
    try {
      const el = reportRef.current;
      if (!el) { showToast('خطأ: العنصر غير موجود', 'error'); return; }

      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:794px;height:1123px;border:none;visibility:hidden;';
      document.body.appendChild(iframe);

      await new Promise(resolve => {
        iframe.onload = resolve;
        iframe.srcdoc = `<!DOCTYPE html><html dir="rtl" lang="ar"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Cairo',sans-serif; direction:rtl; }
body { background:white; width:794px; }
${bw ? `* { color:#000 !important; background:#fff !important; border-color:#333 !important; }
img { filter:grayscale(100%) contrast(1.3) !important; }` : ''}
</style></head><body>${el.outerHTML}</body></html>`;
      });

      await new Promise(r => setTimeout(r, 1500));
      const iDoc = iframe.contentDocument || iframe.contentWindow.document;
      const target = iDoc.querySelector('.rpt-viewer') || iDoc.body.firstElementChild || iDoc.body;

      const canvas = await html2canvas(target, {
        scale: 3, useCORS: true, allowTaint: true,
        backgroundColor: '#ffffff', imageTimeout: 0, logging: false, windowWidth: 794,
      });
      document.body.removeChild(iframe);

      const {jsPDF} = window.jspdf;
      const pdf = new jsPDF('p','mm','a4');
      const W = pdf.internal.pageSize.getWidth();
      const H = pdf.internal.pageSize.getHeight();
      const imgW = W - 10;
      const imgH = (canvas.height * imgW) / canvas.width;
      const quality = 0.93;

      if (imgH <= H - 10) {
        pdf.addImage(canvas.toDataURL('image/jpeg', quality), 'JPEG', 5, 5, imgW, imgH);
      } else {
        let rem = imgH, sy = 0;
        while (rem > 0) {
          const sh = Math.min(rem, H - 10);
          const sc = document.createElement('canvas');
          const ratio = canvas.height / imgH;
          sc.width = canvas.width;
          sc.height = Math.round(sh * ratio);
          sc.getContext('2d').drawImage(canvas, 0, Math.round(sy * ratio), canvas.width, sc.height, 0, 0, canvas.width, sc.height);
          pdf.addImage(sc.toDataURL('image/jpeg', quality), 'JPEG', 5, 5, imgW, sh);
          rem -= sh; sy += sh;
          if (rem > 0) pdf.addPage();
        }
      }

      const suffix = bw ? '_أبيض_أسود' : '_ملون';
      pdf.save('تقرير_إجمالي' + suffix + '_' + new Date().toISOString().split('T')[0] + '.pdf');
      showToast('✅ تم تنزيل PDF بجودة عالية');
    } catch(e) { showToast('خطأ PDF: ' + e.message, 'error'); }
  };

  const downloadPDF   = () => _buildSummaryPDF(false);
  const downloadPDFbw = () => _buildSummaryPDF(true);

  const downloadExcel = () => {
    if (!selectedReports.length) { showToast('اختر محضراً واحداً على الأقل', 'error'); return; }
    try {
      const rows = [
        ['تقرير إجمالي المحاضر'],[''],
        ['اسم المورد',company?.name||'الطاووس للخدمات الصناعية','','نوع التعاقد',company?.contractType||'خدمة النظافة'],[''],
        ['م','رقم المحضر','تاريخ الزيارة','مراقب النظافة','عدد المخالفات','إجمالي المبلغ (OMR)'],
        ...selectedReports.map((r,i)=>[i+1, r.reportNumber, fmtDate(r.inspectionDate), r.inspectorName||'', reportViolations(r.id).length, reportTotal(r.id).toFixed(3)]),
        [''],
        ['','','','إجمالي المخالفات', grandVioCount,''],
        ['','','','إجمالي الغرامات','', grandTotal.toFixed(3)+' OMR'],
      ];
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{wch:5},{wch:18},{wch:16},{wch:24},{wch:16},{wch:20}];
      XLSX.utils.book_append_sheet(wb, ws, 'إجمالي');
      XLSX.writeFile(wb, `تقرير_إجمالي_${new Date().toISOString().split('T')[0]}.xlsx`);
      showToast('تم تنزيل Excel ✓');
    } catch(e) { showToast('خطأ في التصدير', 'error'); }
  };

  return React.createElement('div', null,

    // Selection panel
    !showReport && React.createElement('div', null,

        React.createElement('div', {className:'card-header'}, '📊 اختر المحاضر للتقرير الإجمالي'),
        React.createElement('div', {className:'search-wrap', style:{marginBottom:'10px'}},
          React.createElement('span', {className:'search-icon'}, '🔍'),
          React.createElement('input', {className:'form-control search-input', placeholder:'بحث بالرقم أو مراقب النظافة...', value:q, onChange:e=>setQ(e.target.value)})
        ),
        React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}},
          React.createElement('button', {
            className:'btn btn-sm btn-outline',
            onClick: toggleAll
          }, filtered.every(r=>selected[r.id]) ? '☑ إلغاء تحديد الكل' : '☑ تحديد الكل'),
          React.createElement('span', {className:'badge badge-primary'},
            selectedReports.length + ' محضر محدد'
          ),
        ),
        filtered.length === 0
          ? React.createElement('div', {className:'empty-state', style:{padding:'24px'}},
              React.createElement('div', {className:'empty-icon'}, '📋'),
              React.createElement('div', {className:'empty-title'}, 'لا توجد محاضر')
            )
          : filtered.map(r => {
              const total = reportTotal(r.id);
              const vcount = reportViolations(r.id).length;
              return React.createElement('div', {
                key:r.id,
                style:{
                  display:'flex', alignItems:'center', gap:'12px',

                  border: selected[r.id] ? '2px solid var(--primary)' : '1.5px solid var(--border)',
                  background: selected[r.id] ? '#e8f4fd' : 'white',
                  cursor:'pointer', transition:'all 0.15s'

                onClick: () => toggleSelect(r.id)
              },
                React.createElement('div', {

                    width:'22px', height:'22px', borderRadius:'4px', flexShrink:0,

function SettingsPage({ inspectors, setInspectors, company, setCompany, showToast }) {
  const [newInspector, setNewInspector] = useState('');
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [confirm, setConfirm] = useState(null);
  const [companyForm, setCompanyForm] = useState({...company});
  const [companyEditing, setCompanyEditing] = useState(false);

  const addInspector = () => {
    const trimmed = newInspector.trim();
    if (!trimmed) return;
    if (inspectors.includes(trimmed)) { showToast('الاسم موجود مسبقاً', 'error'); return; }
    setInspectors(prev => [...prev, trimmed]);
    setNewInspector('');
    showToast('تم إضافة مراقب النظافة ✓');
  };

  const deleteInspector = (idx) => {
    setInspectors(prev => prev.filter((_,i) => i !== idx));
    showToast('تم حذف مراقب النظافة ✓');
    setConfirm(null);
  };

  const saveEdit = (idx) => {
    const trimmed = editVal.trim();
    if (!trimmed) return;
    setInspectors(prev => prev.map((v,i) => i===idx ? trimmed : v));
    setEditIdx(null);
    showToast('تم تعديل الاسم ✓');
  };

  const saveCompany = () => {
    setCompany({...companyForm});
    setCompanyEditing(false);
    showToast('تم حفظ بيانات الشركة ✓');
  };

  return React.createElement('div', null,
    confirm !== null && React.createElement(ConfirmDialog, {
      msg: 'هل تريد حذف هذا المراقب؟',
      onConfirm: () => deleteInspector(confirm),
      onCancel: () => setConfirm(null)

    // === COMPANY SETTINGS ===
    React.createElement('div', {className:'card', style:{marginBottom:'14px'}},

      !companyEditing

              React.createElement('span', {style:{fontWeight:800, color:'var(--primary)'}}, company.name),
              React.createElement('span', {style:{color:'var(--text3)', fontWeight:700}}, 'نوع التعاقد:'),
              React.createElement('span', {style:{fontWeight:800, color:'var(--primary)'}}, company.contractType),
            ),
            React.createElement('button', {className:'btn btn-outline btn-block', onClick:()=>{setCompanyForm({...company});setCompanyEditing(true);}}, '✏️ تعديل بيانات الشركة')
          )
        : React.createElement('div', null,
            React.createElement('div', {className:'form-group'},
              React.createElement('label', {className:'form-label'}, 'اسم الشركة'),
              React.createElement('input', {className:'form-control', value:companyForm.name, onChange:e=>setCompanyForm(p=>({...p,name:e.target.value})), placeholder:'اسم الشركة'})
            ),
            React.createElement('div', {className:'form-group'},
              React.createElement('label', {className:'form-label'}, 'نوع التعاقد'),
              React.createElement('input', {className:'form-control', value:companyForm.contractType, onChange:e=>setCompanyForm(p=>({...p,contractType:e.target.value})), placeholder:'نوع التعاقد'})
            ),
            React.createElement('div', {className:'btn-group'},
              React.createElement('button', {className:'btn btn-primary', onClick:saveCompany}, '💾 حفظ'),
              React.createElement('button', {className:'btn btn-outline', onClick:()=>setCompanyEditing(false)}, 'إلغاء'),
            )
          )
    ),

    // === INSPECTORS SETTINGS ===
    React.createElement('div', {className:'card'},
      React.createElement('div', {className:'card-header'}, '👤 مراقبو النظافة (' + inspectors.length + ')'),

      // Add new
      React.createElement('div', {style:{display:'flex', gap:'8px', marginBottom:'16px'}},

            React.createElement('div', {className:'empty-title'}, 'لا يوجد مراقبون'),

        : inspectors.map((name, idx) =>

function StatsPage({ violations, reports }) {
  const [tab, setTab] = React.useState('overview');

  const totalVios = violations.length;
  const totalFines = violations.reduce((s,v) => s+(parseFloat(v.amount)||0), 0);
  const totalReports = reports.length;

  const byVio = {};
  violations.forEach(function(v) {
    var key = v.violationCode || 'غير محدد';
    var name = v.violationName || 'غير محدد';
    if (!byVio[key]) byVio[key] = { code:key, name:name, count:0, total:0 };
    byVio[key].count++;
    byVio[key].total += parseFloat(v.amount)||0;
  });
  const topVios = Object.values(byVio).sort((a,b) => b.count - a.count);
  const maxVioCount = topVios.length > 0 ? topVios[0].count : 1;

  const byClinic = {};
  violations.forEach(function(v) {
    var key = v.clinicName || 'غير محدد';
    if (!byClinic[key]) byClinic[key] = { name:key, count:0, total:0 };
    byClinic[key].count++;
    byClinic[key].total += parseFloat(v.amount)||0;
  });
  const topClinics = Object.values(byClinic).sort((a,b) => b.count - a.count);
  const maxClinicCount = topClinics.length > 0 ? topClinics[0].count : 1;

  const byMonth = {};
  violations.forEach(function(v) {
    const d = v.violationDate || v.createdAt;
    if (!d) return;
    const key = d.substring(0,7);
    if (!byMonth[key]) byMonth[key] = { month:key, count:0, total:0 };
    byMonth[key].count++;
    byMonth[key].total += parseFloat(v.amount)||0;
  });
  const monthData = Object.values(byMonth).sort((a,b) => a.month.localeCompare(b.month)).slice(-6);
  const maxMonthCount = Math.max(...monthData.map(m=>m.count), 1);

  const byCat = {A:{count:0,total:0}, B:{count:0,total:0}, C:{count:0,total:0}};
  violations.forEach(function(v) {
    const cat = v.violationCode ? v.violationCode.charAt(0) : 'A';
    if (byCat[cat]) { byCat[cat].count++; byCat[cat].total += parseFloat(v.amount)||0; }
  });

  const fmtOMR = function(n) { return n.toFixed(3) + ' OMR'; };

    try {
      var canvas = await html2canvas(el, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#f0f4f8',
        imageTimeout: 0,
        logging: false,
      });
      if (bw) el.style.filter = '';
      var jsPDFLib = window.jspdf.jsPDF;
      var pdf = new jsPDFLib('p', 'mm', 'a4');
      var W = pdf.internal.pageSize.getWidth();
      var H = pdf.internal.pageSize.getHeight();
      var imgW = W - 10;
      var imgH = (canvas.height * imgW) / canvas.width;
      var quality = 0.92;
      if (imgH <= H - 10) {
        pdf.addImage(canvas.toDataURL('image/jpeg', quality), 'JPEG', 5, 5, imgW, imgH);
      } else {
        var rem = imgH, sy = 0, pageH = H - 10;
        while (rem > 0) {
          var sh = Math.min(rem, pageH);
          var sc = document.createElement('canvas');
          var ratio = canvas.height / imgH;
          sc.width = canvas.width;
          sc.height = Math.round(sh * ratio);
          sc.getContext('2d').drawImage(canvas, 0, Math.round(sy * ratio), canvas.width, sc.height, 0, 0, canvas.width, sc.height);
          pdf.addImage(sc.toDataURL('image/jpeg', quality), 'JPEG', 5, 5, imgW, sh);
          rem -= sh; sy += sh;
          if (rem > 0) pdf.addPage();
        }
      }

      pdf.save('إحصائيات' + suffix + '_' + new Date().toISOString().split('T')[0] + '.pdf');

function LoginPage({ onLogin }) {
  const [email, setEmail]       = React.useState('');
  const [pass,  setPass]        = React.useState('');
  const [showP, setShowP]       = React.useState(false);
  const [err,   setErr]         = React.useState('');
  const [loading, setLoading]   = React.useState(false);
  const [success, setSuccess]   = React.useState(null);

  const doLogin = () => {
    if (!email.trim() || !pass.trim()) {
      setErr('يرجى إدخال البريد الإلكتروني وكلمة السر');
      return;
    }
    // Check if email is allowed
    const userInfo = ALLOWED_USERS[email.trim().toLowerCase()];
    if (!userInfo) {
      setErr('هذا البريد الإلكتروني غير مصرح له بالدخول');
      return;
    }
    setLoading(true);
    setErr('');
    try {
      const auth = firebase.auth();
      auth.signInWithEmailAndPassword(email.trim(), pass)
        .then((cred) => {
          setLoading(false);
          setSuccess(userInfo);
          setTimeout(() => onLogin(cred.user, userInfo), 1800);
        })
        .catch((e) => {
          setLoading(false);
          const msgs = {
            'auth/wrong-password':    'كلمة السر غير صحيحة',
            'auth/user-not-found':    'البريد الإلكتروني غير مسجل',
            'auth/invalid-email':     'صيغة البريد الإلكتروني غير صحيحة',
            'auth/too-many-requests': 'تم تجاوز عدد المحاولات، حاول لاحقاً',
            'auth/network-request-failed': 'لا يوجد اتصال بالإنترنت',
            'auth/invalid-credential': 'البريد الإلكتروني أو كلمة السر غير صحيحة',
          };
          setErr(msgs[e.code] || 'حدث خطأ: ' + e.message);
        });
    } catch(e) {
      setLoading(false);
      setErr('Firebase Auth غير متاح حالياً');
    }
  };

  const onKey = (e) => { if (e.key === 'Enter') doLogin(); };

  return React.createElement('div', { className: 'login-overlay' },

      // Password
      React.createElement('div', { className: 'login-input-wrap' },
        React.createElement('label', { className: 'login-label' }, 'كلمة السر'),
        React.createElement('div', { style: { position: 'relative' } },
          React.createElement('input', {
            type: showP ? 'text' : 'password',
            className: 'login-input', style: { paddingLeft: '42px' },
            placeholder: '••••••••',
            value: pass, onChange: e => { setPass(e.target.value); setErr(''); },
            onKeyDown: onKey, autoComplete: 'current-password',
          }),
          React.createElement('span', { className: 'login-input-icon' }, '🔒'),
          React.createElement('button', {
            className: 'login-eye',
            onClick: () => setShowP(p => !p), type: 'button',
          }, showP ? '🙈' : '👁️'),
        ),
      ),

      // Button
      React.createElement('button', {
        className: 'login-btn' + (loading ? ' loading' : ''),
        onClick: doLogin, disabled: loading,
      },
        React.createElement('span', { className: 'lbtn-txt' }, '🔐 دخول إلى النظام'),
        React.createElement('div', { className: 'lspinner' }),
      ),

      // Footer
      React.createElement('div', { className: 'login-footer' },
        React.createElement('div', { className: 'login-footer-badge' },
          '🔐 نظام محمي — وزارة الصحة سلطنة عُمان'
        ),
      ),
    )
  );
}

// ===================== ROOT WRAPPER =====================
function Root() {
  const [authState, setAuthState] = React.useState('checking'); // checking | loggedOut | loggedIn
  const [currentUser, setCurrentUser] = React.useState(null);
  const [userInfo, setUserInfo] = React.useState(null);

  React.useEffect(() => {
    try {
      const auth = firebase.auth();
      const unsub = auth.onAuthStateChanged(user => {
        if (user) {
          const info = ALLOWED_USERS[user.email?.toLowerCase()] || 
                       { role: 'user', label: 'مستخدم', canDelete: false, canSettings: false };
          setCurrentUser(user);
          setUserInfo(info);
          setAuthState('loggedIn');
        } else {
          setAuthState('loggedOut');
        }
      });
      return () => unsub();
    } catch(e) {
      // Firebase Auth not available — skip login
      setAuthState('loggedIn');
      setUserInfo({ role: 'admin', label: 'مسؤول', canDelete: true, canSettings: true });
    }
  }, []);

  const handleLogin = (user, info) => {
    setCurrentUser(user);
    setUserInfo(info);
    setAuthState('loggedIn');
  };

  const handleLogout = () => {
    try {
      firebase.auth().signOut();
    } catch(e) {}
    setAuthState('loggedOut');
    setCurrentUser(null);
    setUserInfo(null);
  };

  if (authState === 'checking') {
    return React.createElement('div', {
      style: { position: 'fixed', inset: 0, background: '#020d1a',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'Cairo,sans-serif' }
    },
      React.createElement('div', { style: { textAlign: 'center' } },
        React.createElement('div', { style: { fontSize: '40px', marginBottom: '12px' } }, '🏥'),
        React.createElement('div', { style: { color: 'rgba(0,212,255,0.7)', fontSize: '13px', fontWeight: 700 } },
          'جاري التحقق...')
      )
    );
  }

  if (authState === 'loggedOut') {
    return React.createElement(LoginPage, { onLogin: handleLogin });
  }

  return React.createElement(App, { 
    currentUser, userInfo, onLogout: handleLogout 
  });
}

// ===================== MOUNT =====================
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
</script>
</body>
</html>
